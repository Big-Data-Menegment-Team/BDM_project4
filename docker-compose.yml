# RICO production stack: Postgres + pgvector, MinIO (S3), Ollama (LLM),
# and Airflow 2.10 (LocalExecutor) running the pipeline DAG.
#
# Image versions are pinned for reproducibility.

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  image: rico-airflow:latest
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-rico}:${POSTGRES_PASSWORD:-rico}@postgres:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    PYTHONPATH: /opt/airflow
    # Recorded in pipeline_runs.git_sha (the .git dir is not in the image).
    GIT_SHA: ${GIT_SHA:-unknown}
    # rico pipeline config — reaches the sibling containers by service name.
    POSTGRES_DSN: postgresql://${POSTGRES_USER:-rico}:${POSTGRES_PASSWORD:-rico}@postgres:5432/${POSTGRES_DB:-rico}
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
    MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    MINIO_BUCKET: ${MINIO_BUCKET:-rico-raw}
    OLLAMA_URL: http://ollama:11434
    OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
    SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    HF_HOME: /opt/airflow/.cache/huggingface
  volumes:
    - ./dags:/opt/airflow/dags
    - ./rico:/opt/airflow/rico
    - airflow-logs:/opt/airflow/logs
    - hf-cache:/opt/airflow/.cache/huggingface
  depends_on:
    postgres:
      condition: service_healthy

services:

  postgres:
    # PostgreSQL 16 LTS + pgvector 0.8 (HNSW + halfvec available).
    image: pgvector/pgvector:0.8.0-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rico}
      POSTGRES_USER: ${POSTGRES_USER:-rico}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rico}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Migrations run alphabetically on first init (empty data dir):
      # 001_init.sql then 002_traceability.sql.
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rico} -d ${POSTGRES_DB:-rico}"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    # Pinned RELEASE: MinIO ships breaking server/CLI changes on :latest.
    image: minio/minio:RELEASE.2024-12-13T22-19-12Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console (browse buckets at http://localhost:9001)
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    # Aligns mc client release with the server release above.
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin} &&
      mc mb --ignore-existing local/${MINIO_BUCKET:-rico-raw} &&
      echo 'minio bucket ready'
      "
    restart: "no"

  ollama:
    # Pinned API surface (/api/tags, /api/generate).
    image: ollama/ollama:0.5.4
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama --version >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  ollama-init:
    image: ollama/ollama:0.5.4
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: ollama:11434
    entrypoint: >
      /bin/sh -c "ollama pull ${OLLAMA_MODEL:-qwen2.5:3b} && echo 'ollama model ready'"
    restart: "no"

  # --- Airflow -------------------------------------------------------------
  airflow-init:
    # One-shot: initialise the Airflow metadata DB and create the admin user.
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username "${AIRFLOW_ADMIN_USER:-admin}" \
          --password "${AIRFLOW_ADMIN_PASSWORD:-admin}" \
          --firstname Admin --lastname User --role Admin \
          --email admin@example.com || true
    restart: "no"

  airflow-scheduler:
    # LocalExecutor: the scheduler also runs the tasks (no separate worker).
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s

volumes:
  postgres-data:
  minio-data:
  ollama-data:
  airflow-logs:
  hf-cache:
